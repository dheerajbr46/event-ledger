server:
  port: 8080

spring:
  application:
    name: gateway
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

gateway:
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: 1000
    read-timeout-ms: 2000
  replay:
    enabled: true
    interval-ms: 10000        # re-apply RECEIVED/FAILED events when the account service recovers
    batch-size: 50
  ratelimit:
    requests-per-second: 20    # per-client cap on POST /events

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        # Only genuine availability failures move the breaker; 4xx/validation do not.
        record-exceptions:
          - com.example.gateway.client.RemoteCallException
  retry:
    instances:
      accountService:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 2000ms
        retry-exceptions:
          - com.example.gateway.client.RemoteCallException
  ratelimiter:
    configs:
      default:
        limit-for-period: ${gateway.ratelimit.requests-per-second:20}
        limit-refresh-period: 1s
        timeout-duration: 0s     # do not block; reject immediately when over the limit

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, circuitbreakers, ratelimiters
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  otlp:
    metrics:
      export:
        enabled: false          # metrics go to Prometheus; only traces go via OTLP

logging:
  structured:
    format:
      console: ecs
  level:
    com.example.gateway: INFO
