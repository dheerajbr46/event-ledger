receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  # Forward spans to Jaeger over OTLP gRPC.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Echo a compact summary to the collector's own logs (handy for debugging).
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
